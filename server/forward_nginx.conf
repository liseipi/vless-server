upstream vless_backend {
    # A 主机的地址和端口
    server vss.musicses.vip:443;
    keepalive 64;
}

server {
    listen 80;
    server_name baidu.com www.baidu.com;
    rewrite ^(.*)$ https://$host$1;
    location / {
        index index.html index.htm;
    }
}

server {
        listen 443 ssl;
        #listen [::]:80 angular.sesdiy.com;

        server_name baidu.com www.baidu.com;

        ssl_certificate /etc/letsencrypt/live/www.baidu.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.baidu.com/privkey.pem;

        ssl_session_timeout 5m;
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
        ssl_prefer_server_ciphers on;

        root /home/www/baidu.com/docs;
	    index index.html index.htm index.nginx-debian.html;

        location / {
		    root /home/www/baidu.com/docs;
            try_files $uri $uri/ @router;
            index index.html index.htm;
        }

        location /vs {
            rewrite ^/vs(.*)$ /$1 break;

            proxy_pass https://vless_backend;

            # WebSocket 必需的头
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 【关键修复】传递正确的 Host 头给后端 A 主机
            proxy_set_header Host vss.musicses.vip;  # ← 改成后端的域名

            # 传递客户端真实IP（可选，用于日志）
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置（重要）
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # 缓冲设置
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            # 禁用 access_log 以提高性能（可选）
            # access_log off;
        }

}
